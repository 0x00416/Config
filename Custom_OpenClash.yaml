port: 4160
socks-port: 4161
mixed-port: 4162
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
experimental:
  ignore-resolve-fail: true
ipv6: false
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
    - 223.6.6.6
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
    - "*.home.arpa"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "time.*.apple.com"
    - "time1.*.com"
    - "time2.*.com"
    - "time3.*.com"
    - "time4.*.com"
    - "time5.*.com"
    - "time6.*.com"
    - "time7.*.com"
    - "ntp.*.com"
    - "ntp1.*.com"
    - "ntp2.*.com"
    - "ntp3.*.com"
    - "ntp4.*.com"
    - "ntp5.*.com"
    - "ntp6.*.com"
    - "ntp7.*.com"
    - "*.time.edu.cn"
    - "*.oix_nodes.com"
  nameserver-policy: { +.oix_nodes.com: 1.1.1.1 }
    
proxies: ~

# ==================== 代理策略组 Proxy Groups ====================
# 策略组：定义不同用途的代理策略，可在规则中引用
proxy-groups:
  # --- 核心策略组 ---
  - name: "🚀 手动选择"
    type: select  # select=手动选择,url-test=自动测速,fallback=故障转移,load-balance=负载均衡
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300  # 测试间隔（秒）
    proxies:  # 包含的子策略列表
    - "♻️ 自动选择"
    - "🇭🇰 香港节点"
    - "🇺🇸 美国节点"
    - "🇯🇵 日本节点"
    - "🇸🇬 新加坡节点"
    - "🇼🇸 台湾节点"

    - "🌐 所有地区"
    - __ALL_PROXIES__

  - name: "♻️ 自动选择"
    type: url-test  # 自动测速，选择延迟最低的节点
    tolerance: 50  # 容差（毫秒），延迟差异超过此值才切换节点
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300
    proxies:
    - __ALL_PROXIES__

  - name: "💬 即时通讯"
